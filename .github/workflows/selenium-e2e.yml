name: Selenium Website E2E Tests

on:
  push:
    branches:
      - main

jobs:
  selenium-e2e:
    name: Run Selenium E2E Tests & Generate Excel Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout Code ──────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install Frontend & Start Vite (points at deployed Render backend) ─
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Start Vite Dev Server
        working-directory: ./frontend
        env:
          # Use the already-deployed Render backend — no local DB needed!
          VITE_API_URL: https://xephorabackend.onrender.com
        run: npm run dev -- --host &

      - name: Wait for Vite to be Ready
        run: |
          echo "Waiting for Vite frontend on port 5173..."
          timeout 90 bash -c 'until curl -sf http://localhost:5173 > /dev/null 2>&1; do sleep 3; done'
          echo "✅ Vite is up!"

      # ── 4. Setup Chrome for Headless Selenium ─────────────────────────────────
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      # ── 5. Install Selenium Test Dependencies ─────────────────────────────────
      - name: Install Selenium Test Dependencies
        working-directory: ./selenium-tests
        run: npm install

      # ── 6. Run All 100 E2E Tests (headless Chrome) ────────────────────────────
      - name: Run Selenium E2E Tests
        working-directory: ./selenium-tests
        env:
          BASE_URL: http://localhost:5173
          HEADLESS: 'true'
        run: npm test
        continue-on-error: true  # ALWAYS proceed to report upload even if tests fail

      # ── 7. Upload Excel Report as GitHub Artifact ─────────────────────────────
      - name: Upload Excel Test Report
        if: always()  # Run even if tests or previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: Xephora-E2E-Report-Run-${{ github.run_number }}
          path: selenium-tests/E2E_Advanced_Report.xlsx
          retention-days: 90  # Keep reports for 90 days
          if-no-files-found: warn
