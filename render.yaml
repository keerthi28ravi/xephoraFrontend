services:
  # Express Backend Web Service
  - type: web
    name: xephora-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Paste your MongoDB Atlas connection string in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure 256-bit secret
      - key: FRONTEND_URL
        sync: false # Paste your frontend's public URL in Render dashboard (e.g. https://xephora-frontend.onrender.com)

  # React Frontend Static Site
  - type: web
    name: xephora-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://xephorabackend.onrender.com
