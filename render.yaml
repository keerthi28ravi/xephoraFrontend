services:
  # Express Backend Web Service
  - type: web
    name: xephora-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Paste your MongoDB Atlas connection string in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure 256-bit secret
      - key: FRONTEND_URL
        fromService:
          type: static
          name: xephora-frontend
          property: url

  # React Frontend Static Site
  - type: web
    name: xephora-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: xephora-backend
          property: url
